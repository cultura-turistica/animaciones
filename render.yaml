# ============================================================
# Cultura T Educación — Build Files for Render
# ============================================================

build:
  command: pip install -r requirements.txt
  publishDir: .

services:
  - type: web
    name: cultura-t-educacion
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
