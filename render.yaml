    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        value: postgresql://postgres.izsnyxujyrbksvtguwbd:On1026291904*@aws-1-us-east-1.pooler.supabase.com:6543/postgres
      - key: DEBUG
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
