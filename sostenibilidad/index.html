<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cultura T - Sostenibilidad 45s</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }
    
    .phone-frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 450px;
      max-height: 800px;
      background: #000;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(134, 59, 255, 0.4);
    }
    
    /* ===== CAPAS DE IMAGEN (Ken Burns) ===== */
    .bg-image {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      filter: brightness(0.4) saturate(1.2);
    }
    
    /* Imagen 1: Agua/Naturaleza */
    .bg-1 {
      background-image: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80');
    }
    
    /* Imagen 2: Montañas/Turismo */
    .bg-2 {
      background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&q=80');
    }
    
    /* Imagen 3: Bosque/Verde */
    .bg-3 {
      background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200&q=80');
    }
    
    /* Imagen 4: Atardecer/Naranja */
    .bg-4 {
      background-image: url('https://images.unsplash.com/photo-1507400492013-162706c8c05e?w=1200&q=80');
    }
    
    /* Overlay oscuro para texto */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, 
        rgba(0,0,0,0.7) 0%, 
        rgba(0,0,0,0.3) 30%,
        rgba(0,0,0,0.3) 70%,
        rgba(0,0,0,0.8) 100%);
      z-index: 5;
    }
    
    /* ===== TEXTOS CINEMÁTICOS ===== */
    
    .big-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(40px, 10vw, 64px);
      font-weight: 800;
      color: #fff;
      letter-spacing: 8px;
      text-align: center;
      opacity: 0;
      z-index: 10;
      text-shadow: 0 0 60px rgba(134, 59, 255, 0.8), 0 0 120px rgba(71, 191, 255, 0.5);
    }
    
    .subtitle {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(18px, 4.5vw, 28px);
      font-weight: 300;
      color: #FF8B00;
      letter-spacing: 4px;
      text-align: center;
      opacity: 0;
      z-index: 10;
    }
    
    .tagline {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(12px, 2.5vw, 16px);
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0;
      z-index: 10;
    }
    
    /* Estadísticas */
    .stat-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      z-index: 10;
    }
    
    .stat-number {
      font-size: clamp(80px, 22vw, 140px);
      font-weight: 800;
      color: #47bfff;
      line-height: 1;
      text-shadow: 0 0 80px rgba(71, 191, 255, 0.8);
    }
    
    .stat-label {
      font-size: clamp(14px, 3.5vw, 24px);
      font-weight: 600;
      color: #fff;
      letter-spacing: 6px;
      margin-top: 10px;
    }
    
    /* Logo */
    .logo-bottom {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      z-index: 10;
    }
    
    .logo-bottom .brand {
      font-size: clamp(28px, 7vw, 44px);
      font-weight: 800;
      color: #fff;
      letter-spacing: 4px;
    }
    
    .logo-bottom .slogan {
      font-size: clamp(11px, 2.5vw, 15px);
      color: #FF8B00;
      letter-spacing: 3px;
      margin-top: 8px;
    }
    
    /* Partículas flotantes */
    .particle {
      position: absolute;
      background: rgba(134, 59, 255, 0.6);
      border-radius: 50%;
      z-index: 4;
    }
    
    /* Línea decorativa */
    .deco-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, #863bff, #47bfff, transparent);
      z-index: 10;
    }
    
    /* Fade final */
    .fadeout {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      opacity: 0;
      z-index: 15;
    }
    
    /* Countdown */
    .countdown {
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(12px, 2.5vw, 16px);
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
      z-index: 12;
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="phone-frame" id="video">

  <!-- Fondos con Ken Burns -->
  <div class="bg-image bg-1" id="bg1"></div>
  <div class="bg-image bg-2" id="bg2"></div>
  <div class="bg-image bg-3" id="bg3"></div>
  <div class="bg-image bg-4" id="bg4"></div>
  
  <!-- Overlay -->
  <div class="overlay"></div>
  
  <!-- Partículas -->
  <div id="particles"></div>
  
  <!-- Contenido -->
  <div class="tagline" id="tagline">FONTUR • CULTURA T</div>
  
  <div class="big-title" id="title">SOSTENIBILIDAD</div>
  
  <div class="deco-line" id="decoLine" style="top: 22%; width: 0;"></div>
  
  <div class="subtitle" id="subtitle">El turismo que deja huella</div>
  
  <div class="stat-container" id="statContainer">
    <div class="stat-number" id="statNumber">0</div>
    <div class="stat-label">GESTIÓN EFICIENTE</div>
  </div>
  
  <div class="logo-bottom" id="logoBottom">
    <div class="brand">cultura t®</div>
    <div class="slogan">Turismo con sentido</div>
  </div>
  
  <div class="countdown" id="countdown">45s</div>
  
  <div class="fadeout" id="fadeout"></div>
  
</div>

<script>
  // Crear partículas
  const pc = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.width = (2 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    pc.appendChild(p);
  }
  
  // Timeline GSAP - 45 segundos
  const tl = gsap.timeline({ defaults: { ease: "power2.inOut" } });
  
  // ===== 0-3s: Entrada dramática =====
  tl.to('#bg1', { opacity: 1, scale: 1.1, duration: 3 }, 0)
    .from('#bg1', { scale: 1.3, duration: 4 }, 0)
    .to('#tagline', { opacity: 1, duration: 1 }, 0.5)
    .to('#title', { opacity: 1, scale: 1, duration: 1.5 }, 1)
    .to('#decoLine', { width: 200, opacity: 1, duration: 1 }, 1.5);
  
  // ===== 3-8s: Transición imagen 2 =====
  tl.to('#bg1', { opacity: 0, scale: 1.2, duration: 2 }, 4)
    .to('#bg2', { opacity: 1, scale: 1.15, duration: 2 }, 5)
    .from('#bg2', { scale: 1.4, duration: 4 }, 5)
    .to('#subtitle', { opacity: 1, duration: 1 }, 5.5);
  
  // ===== 8-13s: Transición imagen 3 =====
  tl.to('#subtitle', { opacity: 0, y: -20, duration: 0.8 }, 8)
    .to('#title', { opacity: 0, scale: 0.8, duration: 1 }, 8)
    .to('#bg2', { opacity: 0, scale: 1.1, duration: 1.5 }, 10)
    .to('#bg3', { opacity: 1, scale: 1.1, duration: 1.5 }, 11)
    .from('#bg3', { scale: 1.3, duration: 4 }, 11);
  
  // ===== 13-20s: Estadísticas =====
  tl.to('#statContainer', { opacity: 1, duration: 1 }, 13)
    .to('#statNumber', { innerText: 73, duration: 2, snap: { innerText: 1 } }, 14)
    // Partículas se aceleran
    .to('.particle', { opacity: 0.8, scale: 1.5, duration: 0.5, stagger: 0.05 }, 15)
    .to('.particle', { opacity: 0.3, scale: 1, duration: 3, stagger: 0.03 }, 16);
  
  // ===== 20-25s: Transición imagen 4 (atardecer) =====
  tl.to('#statContainer', { opacity: 0, scale: 0.9, duration: 1 }, 20)
    .to('#bg3', { opacity: 0, scale: 1.2, duration: 1.5 }, 21)
    .to('#bg4', { opacity: 1, scale: 1.1, duration: 1.5 }, 22)
    .from('#bg4', { scale: 1.4, duration: 4 }, 22);
  
  // ===== 25-33s: Título de nuevo =====
  tl.to('#title', { opacity: 1, scale: 1, duration: 1 }, 25)
    .to('#subtitle', { opacity: 1, y: 0, duration: 1 }, 25.5)
    .to('#decoLine', { width: 250, opacity: 1, duration: 1 }, 26)
    .to('#tagline', { opacity: 0.7, duration: 1 }, 27);
  
  // ===== 33-38s: Logo final =====
  tl.to(['#title', '#subtitle'], { opacity: 0, scale: 0.8, duration: 1 }, 33)
    .to('#bg4', { opacity: 0, scale: 1.1, duration: 1.5 }, 34)
    .to('#bg1', { opacity: 0.3, scale: 1.05, duration: 1 }, 35)
    .to('#logoBottom', { opacity: 1, duration: 1.5 }, 35.5)
    .to('#countdown', { opacity: 1, duration: 1 }, 36);
  
  // ===== 38-45s: Fade out final =====
  tl.to('#fadeout', { opacity: 1, duration: 2.5 }, 39)
    .to(['#logoBottom', '#tagline', '#countdown', '.particle'], { opacity: 0, duration: 2 }, 39);
  
  // Mensaje final
  tl.call(() => {
    document.getElementById('video').innerHTML += 
      '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#863bff;font-size:14px;letter-spacing:3px;text-align:center;z-index:100;background:rgba(0,0,0,0.8);padding:30px;border-radius:10px;">GRABA ESTA PANTALLA<br><span style="font-size:12px;color:#FF8B00;">1080x1920 • 45 segundos</span></div>';
  });
</script>

</body>
</html>
