{% extends "base.html" %}
{% block title %}Materias{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-book"></i> Materias</h3>
    <a href="{% url 'materia_create' %}" class="btn btn-ct"><i class="bi bi-plus-circle"></i> Nueva</a>
</div>
<table class="table table-hover">
    <thead><tr><th>Materia</th><th>Colegio</th><th>Profesor</th></tr></thead>
    <tbody>
    {% for m in materias %}
    <tr><td>{{ m.nombre }}</td><td>{{ m.colegio.nombre }}</td><td>{{ m.profesor.get_full_name|default:"—" }}</td></tr>
    {% empty %}
    <tr><td colspan="3" class="text-center text-muted">Sin materias registradas.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
