{% extends "base.html" %}
{% block title %}{{ action }} Materia{% endblock %}
{% block content %}
<div class="row"><div class="col-md-6 offset-md-3">
    <div class="card">
        <div class="card-header"><h4>{{ action }} Materia</h4></div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3"><label class="form-label">Nombre *</label><input type="text" name="nombre" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Colegio *</label><select name="colegio" class="form-select" required><option value="">-- Seleccionar --</option>{% for c in colegios %}<option value="{{ c.id }}">{{ c.nombre }}</option>{% endfor %}</select></div>
                <div class="mb-3"><label class="form-label">Profesor</label><select name="profesor" class="form-select"><option value="">-- Ninguno --</option>{% for p in profesores %}<option value="{{ p.id }}">{{ p.get_full_name }}</option>{% endfor %}</select></div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{% url 'materia_list' %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-ct">{{ action }}</button>
                </div>
            </form>
        </div>
    </div>
</div></div>
{% endblock %}
