<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cultura T - Sostenibilidad</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.3.2/anime.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0A0A0A;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      max-width: 1080px;
      max-height: 1920px;
      margin: 0 auto;
      position: relative;
      background: linear-gradient(180deg, #0A0A0A 0%, #1B365D 50%, #0A0A0A 100%);
      overflow: hidden;
    }
    
    /* Partículas - más suaves */
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00B4D8;
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 8px 2px rgba(0,180,216,0.5);
    }
    
    /* Gota de agua */
    .water-drop {
      position: absolute;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 100px;
      opacity: 0;
    }
    
    .water-drop svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 15px rgba(0,180,216,0.6));
    }
    
    /* Ripple effect - más suave */
    .ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(0,180,216,0.6);
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 20px rgba(0,180,216,0.3), inset 0 0 15px rgba(0,180,216,0.2);
    }
    
    /* Texto Sostenibilidad */
    .text-sostenibilidad {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(48px, 10vw, 72px);
      font-weight: 800;
      color: #FFFFFF;
      text-shadow: 0 0 30px rgba(0,180,216,0.8);
      opacity: 0;
      letter-spacing: 6px;
      white-space: nowrap;
    }
    
    /* Subtítulo */
    .subtitulo {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 300;
      color: #FF8B00;
      text-shadow: 0 0 15px rgba(255,139,0,0.6);
      opacity: 0;
      letter-spacing: 3px;
    }
    
    /* Logo */
    .logo-container {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
    }
    
    .logo-container .logo {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: 4px;
    }
    
    .logo-container .tagline {
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: 300;
      color: #00B4D8;
      letter-spacing: 2px;
      margin-top: 8px;
    }
    
    .logo-container .slogan {
      font-size: clamp(16px, 3vw, 20px);
      font-weight: 600;
      color: #FF8B00;
      letter-spacing: 2px;
      margin-top: 12px;
    }

    /* Glow central */
    .glow-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(0,180,216,0.2) 0%, transparent 70%);
      opacity: 0;
    }
    
    /* Fade overlay para suavizar */
    .fade-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0A0A0A;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="container" id="video">
    
    <!-- Fade overlay -->
    <div class="fade-overlay" id="fadeIn"></div>
    
    <!-- Partículas -->
    <div id="particles"></div>
    
    <!-- Gota de agua -->
    <div class="water-drop" id="waterDrop">
      <svg viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 5C40 5 10 45 10 65C10 82 23.5 95 40 95C56.5 95 70 82 70 65C70 45 40 5 40 5Z" 
              fill="url(#dropGrad)" stroke="#00B4D8" stroke-width="2"/>
        <defs>
          <linearGradient id="dropGrad" x1="40" y1="5" x2="40" y2="95" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#1B365D" stop-opacity="0.7"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    
    <!-- Ripples -->
    <div class="ripple" id="ripple1"></div>
    <div class="ripple" id="ripple2"></div>
    <div class="ripple" id="ripple3"></div>
    
    <!-- Glow central -->
    <div class="glow-center" id="glow"></div>
    
    <!-- Textos -->
    <div class="text-sostenibilidad" id="title">SOSTENIBILIDAD</div>
    <div class="subtitulo" id="subtitulo">Cierra la llave</div>
    
    <!-- Logo -->
    <div class="logo-container" id="logo">
      <div class="logo">cultura t®</div>
      <div class="tagline">Gestión y desarrollo</div>
      <div class="slogan">Turismo con sentido</div>
    </div>
    
  </div>
  
  <script>
    // Crear partículas - menos y más分布均匀
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (10 + Math.random() * 80) + '%';
      p.style.top = (10 + Math.random() * 80) + '%';
      particlesContainer.appendChild(p);
    }
    
    // Timeline principal - más suave
    const tl = anime.timeline({
      easing: 'easeOutExpo',
      duration: 3000
    });
    
    // Fade in inicial
    tl.add({
      targets: '#fadeIn',
      opacity: [1, 0],
      duration: 800,
      easing: 'easeOutQuad'
    })
    
    // 0-2s: Aparecen partículas suavemente
    .add({
      targets: '.particle',
      opacity: [0, 0.7],
      scale: [0, 1],
      delay: anime.stagger(40),
      duration: 2000,
      easing: 'easeOutQuad'
    }, '-=300')
    
    // 2-4s: Gota aparece y cae
    .add({
      targets: '#waterDrop',
      opacity: [{ value: 0 }, { value: 1, duration: 300 }],
      translateY: ['-100px', '45vh'],
      duration: 2500,
      easing: 'easeInQuad'
    }, '+=500')
    
    // 4-5s: Gota desaparece con fade suave
    .add({
      targets: '#waterDrop',
      opacity: [1, 0],
      scale: [1, 1.5],
      duration: 500,
      easing: 'easeOutQuad'
    })
    
    // Ripples - más suaves y lentos
    .add({
      targets: '#ripple1',
      opacity: [{ value: 0.7 }, { value: 0, duration: 2000 }],
      width: ['0px', '350px'],
      height: ['0px', '350px'],
      duration: 2000,
      easing: 'easeOutQuad'
    }, '-=300')
    .add({
      targets: '#ripple2',
      opacity: [{ value: 0.5 }, { value: 0, duration: 2500 }],
      width: ['0px', '500px'],
      height: ['0px', '500px'],
      duration: 2500,
      easing: 'easeOutQuad'
    }, '-=2000')
    .add({
      targets: '#ripple3',
      opacity: [{ value: 0.3 }, { value: 0, duration: 3000 }],
      width: ['0px', '650px'],
      height: ['0px', '650px'],
      duration: 3000,
      easing: 'easeOutQuad'
    }, '-=2500')
    
    // Glow - suave
    .add({
      targets: '#glow',
      opacity: [{ value: 0.8, duration: 500 }, { value: 0, duration: 2000 }],
      scale: [{ value: 0.5 }, { value: 2 }],
      duration: 2500
    }, '-=2800')
    
    // Título - entra suave
    .add({
      targets: '#title',
      opacity: [{ value: 0 }, { value: 1, duration: 800 }],
      translateY: [{ value: 40 }, { value: 0 }],
      duration: 1200,
      easing: 'easeOutQuart'
    }, '-=800')
    
    // Subtítulo
    .add({
      targets: '#subtitulo',
      opacity: [{ value: 0 }, { value: 1, duration: 600 }],
      scale: [{ value: 0.9 }, { value: 1 }],
      duration: 800,
      easing: 'easeOutQuart'
    }, '+=100')
    
    // Logo aparece
    .add({
      targets: '#logo',
      opacity: [{ value: 0 }, { value: 1, duration: 1000 }],
      translateY: [{ value: 30 }, { value: 0 }],
      duration: 1200,
      easing: 'easeOutQuart'
    }, '+=500')
    
    // Pausa para ver
    .add({
      targets: {},
      duration: 2000
    })
    
    // Fade out final - suave
    .add({
      targets: '.container',
      opacity: [1, 0],
      duration: 1500,
      easing: 'easeInQuad'
    });
    
    // Loop
    tl.finished.then(() => {
      setTimeout(() => location.reload(), 2000);
    });
  </script>
</body>
</html>
