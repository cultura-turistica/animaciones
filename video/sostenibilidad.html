<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cultura T - Sostenibilidad</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.3.2/anime.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0A0A0A;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      max-width: 1080px;
      max-height: 1920px;
      margin: 0 auto;
      position: relative;
      background: linear-gradient(180deg, #0A0A0A 0%, #1B365D 100%);
      overflow: hidden;
    }
    
    /* Partículas de luz */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00B4D8;
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 6px 2px #00B4D8;
    }
    
    /* Gota de agua */
    .water-drop {
      position: absolute;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 100px;
      opacity: 0;
    }
    
    .water-drop svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px #00B4D8);
    }
    
    /* Ripple effect */
    .ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 3px solid #00B4D8;
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 30px #00B4D8, inset 0 0 30px #00B4D8;
    }
    
    /* Texto Sostenibilidad */
    .text-sostenibilidad {
      position: absolute;
      top: 25%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 72px;
      font-weight: 800;
      color: #FFFFFF;
      text-shadow: 0 0 40px #00B4D8;
      opacity: 0;
      letter-spacing: 8px;
      white-space: nowrap;
    }
    
    /* Subtítulo */
    .subtitulo {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      font-weight: 300;
      color: #FF8B00;
      text-shadow: 0 0 20px #FF8B00;
      opacity: 0;
      letter-spacing: 4px;
    }
    
    /* Logo */
    .logo-container {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
    }
    
    .logo-container .logo {
      font-size: 48px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: 4px;
    }
    
    .logo-container .tagline {
      font-size: 18px;
      font-weight: 300;
      color: #00B4D8;
      letter-spacing: 2px;
      margin-top: 8px;
    }
    
    .logo-container .slogan {
      font-size: 20px;
      font-weight: 600;
      color: #FF8B00;
      letter-spacing: 2px;
      margin-top: 16px;
    }

    /* Glow overlay */
    .glow-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,180,216,0.3) 0%, transparent 70%);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="container" id="video">
    
    <!-- Partículas -->
    <div id="particles"></div>
    
    <!-- Gota de agua -->
    <div class="water-drop" id="waterDrop">
      <svg viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 5C40 5 10 45 10 65C10 82 23.5 95 40 95C56.5 95 70 82 70 65C70 45 40 5 40 5Z" 
              fill="url(#dropGrad)" stroke="#00B4D8" stroke-width="2"/>
        <defs>
          <linearGradient id="dropGrad" x1="40" y1="5" x2="40" y2="95" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#1B365D" stop-opacity="0.6"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    
    <!-- Ripple -->
    <div class="ripple" id="ripple1"></div>
    <div class="ripple" id="ripple2"></div>
    <div class="ripple" id="ripple3"></div>
    
    <!-- Glow central -->
    <div class="glow-center" id="glow"></div>
    
    <!-- Textos -->
    <div class="text-sostenibilidad" id="title">SOSTENIBILIDAD</div>
    <div class="subtitulo" id="subtitulo">Cierra la llave</div>
    
    <!-- Logo -->
    <div class="logo-container" id="logo">
      <div class="logo">cultura t®</div>
      <div class="tagline">Gestión y desarrollo</div>
      <div class="slogan">Turismo con sentido</div>
    </div>
    
  </div>
  
  <script>
    // Crear partículas
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 2 + 's';
      particlesContainer.appendChild(p);
    }
    
    // Timeline principal
    const tl = anime.timeline({
      easing: 'easeOutExpo',
      duration: 3000
    });
    
    // 0-2s: Aparecen partículas
    tl.add({
      targets: '.particle',
      opacity: [0, 0.8],
      scale: [0, 1],
      delay: anime.stagger(30),
      duration: 1500
    })
    
    // 2-4s: Gota cae
    .add({
      targets: '#waterDrop',
      opacity: [0, 1],
      translateY: [0, 0],
      duration: 100
    }, '-=500')
    .add({
      targets: '#waterDrop',
      translateY: ['-100px', '45vh'],
      duration: 2000,
      easing: 'easeInQuad'
    })
    
    // 4-5s: Gota desaparece, ripple inicio
    .add({
      targets: '#waterDrop',
      opacity: [1, 0],
      scale: [1, 2],
      duration: 300,
      easing: 'easeOutQuad'
    }, '+=200')
    
    // Ripples
    .add({
      targets: '#ripple1',
      opacity: [0.8, 0],
      width: ['0px', '400px'],
      height: ['0px', '400px'],
      duration: 1500,
      easing: 'easeOutQuad'
    }, '-=200')
    .add({
      targets: '#ripple2',
      opacity: [0.6, 0],
      width: ['0px', '600px'],
      height: ['0px', '600px'],
      duration: 1800,
      easing: 'easeOutQuad'
    }, '-=1200')
    .add({
      targets: '#ripple3',
      opacity: [0.4, 0],
      width: ['0px', '800px'],
      height: ['0px', '800px'],
      duration: 2100,
      easing: 'easeOutQuad'
    }, '-=1600')
    
    // Glow
    .add({
      targets: '#glow',
      opacity: [0, 1, 0],
      scale: [0.5, 1.5],
      duration: 2000
    }, '-=1800')
    
    // Título
    .add({
      targets: '#title',
      opacity: [0, 1],
      translateY: [30, 0],
      translateX: [-50, -50],
      duration: 800
    }, '-=1000')
    
    // Subtítulo
    .add({
      targets: '#subtitulo',
      opacity: [0, 1],
      scale: [0.8, 1],
      duration: 600,
      easing: 'easeOutBack'
    }, '+=200')
    
    // Logo aparece
    .add({
      targets: '#logo',
      opacity: [0, 1],
      translateY: [50, 0],
      duration: 1000,
      easing: 'easeOutQuad'
    }, '+=500')
    
    // Fade out final
    .add({
      targets: '.container',
      opacity: [1, 0],
      duration: 1000,
      easing: 'easeInQuad'
    }, '+=2000');
    
    // Loop
    tl.finished.then(() => {
      setTimeout(() => location.reload(), 3000);
    });
  </script>
</body>
</html>
